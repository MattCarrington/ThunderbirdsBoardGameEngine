services:
  api:
    container_name: thunderbirds-api
    build:
      context: ..
      dockerfile: ThunderbirdsBoardGameEngine.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
  ui:
    container_name: thunderbirds-ui
    build:
      context: ..
      dockerfile: ThunderbirdsBoardGameEngine.GameData.Ui/Dockerfile
    environment:
      API_URL: http://api:8080
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
