services:
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Cors__AllowedOrigins: http://localhost:3000
      Catalog__DisasterCards__Json__FilePath: /app/TestData/Catalog/DisasterCard/Enveloped/disaster-cards.json
      Catalog__DisasterCards__Warmup__Enabled: "true"
      Catalog__DisasterCards__Warmup__Timeout: "00:00:10"
    volumes:
      - ../TestData:/app/TestData
    ports:
      - "8080:8080"   # publish so the host (runner) can call localhost:8080
