name: thunderbirds-azure-dev
description: Minimal Azure DEV infrastructure for Thunderbirds Board Game Engine
runtime: dotnet
main: ./
config:
  thunderbirds-azure-dev:baseName:
    default: tbbge
  thunderbirds-azure-dev:containerImage:
    default: ghcr.io/mattcarrington/thunderbirds-app:latest
  thunderbirds-azure-dev:containerPort:
    default: 8080
