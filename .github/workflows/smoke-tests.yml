name: Smoke Tests

on:
  workflow_call:
    inputs:
      deployment_uri:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: latest
    secrets:
      registry_token:
        required: false

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Docker Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.registry_token || github.token }}

      - name: Run Smoke Test Container
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          docker run --rm \
            -e "SMOKE_TEST_BASE_URL=${{ inputs.deployment_uri }}" \
            "ghcr.io/$OWNER/thunderbirds-smoke-tests:${{ inputs.image_tag }}"