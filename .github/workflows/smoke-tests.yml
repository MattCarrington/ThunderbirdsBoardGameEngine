name: Smoke Tests

on:
  workflow_call:
    inputs:
      deployment_uri:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Run Smoke Test Container
        run: |
          docker run --rm \
            -e SMOKE_TEST_BASE_URL=${{ inputs.deployment_uri }} \
            ghcr.io/${{ github.repository_owner }}/thunderbirds-smoke-tests:${{ inputs.image_tag }}