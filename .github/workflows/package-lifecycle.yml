name: Publish .NET Package (resuable)

on:
  workflow_call:
    inputs:
      project_path:
        description: "Path to the .csproj"
        required: true
        type: string
      package_id:
        description: NuGet package ID
        required: true
        type: string

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Compute package version
        id: compute
        shell: bash
        env:
          PACKAGE_ID: ${{ inputs.package_id }}
          PROJECT_PATH: ${{ inputs.project_path }}
          OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./.github/scripts/compute-package-version.sh

      - name: Apply package version to target project only
        if: steps.compute.outputs.should_publish == 'true'
        run: |
          VERSION="${{ steps.compute.outputs.version }}"
          PROJECT="${{ inputs.project_path }}"

          sed -i "0,/<Version>.*<\/Version>/s//<Version>${VERSION}<\/Version>/" "$PROJECT"

      - name: Pack
        if: steps.compute.outputs.should_publish == 'true'
        run: |
          dotnet pack "${{ inputs.project_path }}" \
            -c Release \
            -o ./artifacts

      - name: Publish to GitHub Packages
        if: steps.compute.outputs.should_publish == 'true'
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ github.token }}" \
            --skip-duplicate

      - name: Skip publish (stable already exists)
        if: steps.compute.outputs.should_publish != 'true'
        run: |
          echo "Stable version already exists — skipping package publish"
