name: Cleanup NuGet prerelease packages

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: NuGet package ID to clean up
        required: true
        type: string
      dry_run:
        description: Run in dry-run mode (no deletions)
        required: false
        default: true
        type: boolean

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Cleanup prereleases (skeleton)
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_ID="${{ inputs.package_id }}"
          DRY_RUN="${{ inputs.dry_run }}"
          OWNER="${{ github.repository_owner }}"

          echo "NuGet prerelease cleanup"
          echo "------------------------"
          echo "Package: $PACKAGE_ID"
          echo "Owner:   $OWNER"
          echo "Dry run: $DRY_RUN"
          echo
          echo "No cleanup logic implemented yet."
          echo "This is a skeleton workflow."
