name: CI - Main

on:
  push:
    branches: 
        - main
  pull_request:

env:
  SOLUTION_FILE: &solution ThunderbirdsBoardGameEngine.sln
  BASE_URL: &base_url "http://localhost:8080"

jobs:
  static-analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      solution_file: *solution

  build:
    uses: ./.github/workflows/build.yml
    with:
      solution_file: *solution
      docker_build: true
    needs:
      - static-analysis

  tests:
    uses: ./.github/workflows/tests.yml
    with:
      solution_file: *solution
      run_component: true
      run_integration: true
      run_playwright: true
      base_url: *base_url
    needs:
      - build
