name: CI - Main

on:
  push:
    branches: 
        - main
  workflow_dispatch: {}

env:
  SOLUTION_FILE: &solution ThunderbirdsBoardGameEngine.sln
  BASE_URL: &base_url "http://localhost:8080"

jobs:
  static-analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      solution_file: *solution

  build:
    uses: ./.github/workflows/build.yml
    with:
      solution_file: *solution
      docker_build: true
    needs:
      - static-analysis

  startup-docker-env:
    uses: ./.github/workflows/docker-env.yml
    with:
      api_url: *base_url
    needs: 
      - build

  tests:
    uses: ./.github/workflows/tests.yml
    with:
      solution_file: *solution
      run_component: true
      run_integration: true
      run_playwright: true
      base_url: *base_url
    needs:
      - startup-docker-env
    
  teardown-docker-env:
    uses: ./.github/workflows/docker-teardown.yml
    if: always()
    needs: 
      - tests