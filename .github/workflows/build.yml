name: Build (reusable)

on:
  workflow_call:
    inputs:
      solution_file:
        required: true
        type: string
      
      docker_build:
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build .NET Solution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore & Build
        run: |
          dotnet restore "${{ inputs.solution_file }}"
          dotnet build "${{ inputs.solution_file }}" --configuration Release --no-restore      

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: ${{ inputs.docker_build }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image (SHA-tagged)
        run: |
          IMAGE="thunderbirds-api"
          SHA_TAG="sha-${GITHUB_SHA::7}"

          # Build once, with deterministic SHA tag
          docker build -t "$IMAGE:$SHA_TAG" \
                       -t "$IMAGE:dev" \
                       -f ThunderbirdsBoardGameEngine.Api/Dockerfile .

      - name: Save Docker Image
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          docker save "thunderbirds-api:$SHA_TAG" -o thunderbirds-api.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderbirds-api-image
          path: thunderbirds-api.tar
          retention-days: 7
