name: Tests (reusable)

on:
  workflow_call:
    inputs:
      solution_file:
        required: true
        type: string

      run_component:
        description: "Run component tests"
        required: false
        type: boolean
        default: true

      run_integration:
        description: "Run integration tests (assumes API is already running)"
        required: false
        type: boolean
        default: true

      run_playwright:
        description: "Run Playwright UI tests (assumes app/API is already running)"
        required: false
        type: boolean
        default: true

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Unit Tests
        run: |
          set -e
          echo "🚀 Running all Unit Tests..."
          dotnet test "${{ inputs.solution_file }}" \
            --configuration Release \
            --logger:"trx;LogFileName=unit-${RUNNER_OS}.trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~UnitTests"
                
      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/Unit
          retention-days: 7

  component-tests:
    name: Run Component Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run_component }}
    needs: unit-tests

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Component Tests
        run: |
          set -e
          echo "🚀 Running all Component Tests..."
          dotnet test ${{ inputs.solution_file }} \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~ComponentTests"
                
      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: component-test-results
          path: ./TestResults/Component
          retention-days: 7

  integration-tests:
    name: Run Integration
    runs-on: ubuntu-latest
    if: ${{ inputs.run_integration }}
    needs: component-tests

    env:
      CatalogBaseUrl: "http://localhost:8080"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Integration Tests
        run: |
          set -e
          echo "🚀 Running all Integration Tests..."
          dotnet test ${{ inputs.solution_file }} \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults/Integration \
            --filter "FullyQualifiedName~IntegrationTests"

      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./TestResults/Integration
          retention-days: 7

  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run_playwright }}
    needs: integration-tests

    env:
      BASE_URL: "http://localhost:8080"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Playwright CLI
        run: dotnet tool install --global Microsoft.Playwright.CLI

      - name: Build Playwright test project & install browsers
        working-directory: ThunderbirdsBoardGameEngine.PlaywrightTests
        run: |
          dotnet build --configuration Release
          playwright install

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          dotnet test ${{ inputs.solution_file }} \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults/Playwright \
            --filter "FullyQualifiedName~PlaywrightTests"

      - name: Upload Playwright test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: ./TestResults/Playwright
          retention-days: 7