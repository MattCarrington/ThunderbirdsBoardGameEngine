name: docker-teardown (reusable)

on:
  workflow_call:

jobs:
  teardown:
    name: Tear down env
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Stop containers
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          docker compose \
            -f Docker/docker-compose.yml \
            -f Docker/docker-compose.test.yml \
            down -v