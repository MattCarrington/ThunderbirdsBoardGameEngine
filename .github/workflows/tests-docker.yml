name: Integration And Playwright Tests (reusable)

on:
  workflow_call:
    inputs:
      solution_file:
        required: true
        type: string
      image_name:
        description: "Docker image name to use for API"
        required: false
        type: string
        default: "thunderbirds-api"
      run_integration:
        description: "Run integration tests"
        required: false
        type: boolean
        default: true
      run_playwright:
        description: "Run Playwright UI tests"
        required: false
        type: boolean
        default: true
      base_url:
        description: "Base URL for the API"
        required: false
        type: string
        default: "http://localhost:8080"

jobs:
  tests-docker:
    name: Run Integration And Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Download Docker image artifact
        if: ${{ inputs.run_integration || inputs.run_playwright }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.image_name }}-image
          path: .

      - name: Load Docker image
        if: ${{ inputs.run_integration || inputs.run_playwright }}
        run: docker load -i ${{ inputs.image_name }}.tar

      - name: Start API env
        if: ${{ inputs.run_integration || inputs.run_playwright }}
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          docker compose \
          -f Docker/docker-compose.yml \
          -f Docker/docker-compose.test.yml \
          -f Docker/docker-compose.ci.override.yml \
          up -d

      - name: Wait for readiness
        if: ${{ inputs.run_integration || inputs.run_playwright }}
        run: |
          set -euo pipefail
          for i in {1..60}; do
          if curl -fsS "${{ inputs.base_url }}/health/ready" >/dev/null; then
            echo "API is healthy!"; exit 0;
          fi
          echo "API not ready yet... ($i/60)"
          sleep 2
          done
          echo "API did not become ready in time"; exit 1

      - name: Run Integration Tests
        if: ${{ inputs.run_integration }}
        run: |
          set -e
          echo "🚀 Running all Integration Tests..."
          integration_projects=$(dotnet sln "${{ inputs.solution_file }}" list | tail -n +3 | sed 's/\r$//' | grep -E 'IntegrationTests\.csproj$' || true)
          if [ -z "$integration_projects" ]; then
            echo "❌ No IntegrationTests projects found in solution!" >&2
            exit 1
          fi
          for project in $integration_projects; do
            echo "Testing: $project"
            base_name=$(basename "$project" .csproj)
            dotnet test "$project" \
              --configuration Release \
              --logger:"trx;LogFileName=integration-${base_name}-${RUNNER_OS}.trx" \
              --results-directory ./TestResults/Integration
          done
        env:
          CatalogBaseUrl: ${{ inputs.base_url }}

      - name: Install Playwright CLI
        if: ${{ inputs.run_playwright }}
        run: dotnet tool install --global Microsoft.Playwright.CLI

      - name: Build Playwright test project & install browsers
        if: ${{ inputs.run_playwright }}
        working-directory: tests/EndToEnd/ThunderbirdsBoardGameEngine.PlaywrightTests
        run: |
          dotnet build --configuration Release
          playwright install

      - name: Run Playwright tests
        if: ${{ inputs.run_playwright }}
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          set -e
          echo "🚀 Running all Playwright Tests..."
          playwright_projects=$(dotnet sln "${{ inputs.solution_file }}" list | tail -n +3 | sed 's/\r$//' | grep -E 'PlaywrightTests\.csproj$' || true)
          if [ -z "$playwright_projects" ]; then
            echo "❌ No PlaywrightTests projects found in solution!" >&2
            exit 1
          fi
          for project in $playwright_projects; do
            echo "Testing: $project"
            base_name=$(basename "$project" .csproj)
            dotnet test "$project" \
              --configuration Release \
              --logger:"trx;LogFileName=playwright-${base_name}-${RUNNER_OS}.trx" \
              --results-directory ./TestResults/Playwright
          done

      - name: Stop containers
        if: ${{ inputs.run_integration || inputs.run_playwright }}
        run: |
            set -euo pipefail
            unset COMPOSE_FILE
            docker compose \
                -f Docker/docker-compose.yml \
                -f Docker/docker-compose.test.yml \
                down -v
