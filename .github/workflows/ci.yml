name: CI

on:
  pull_request:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  packages: write

env:
  SOLUTION_FILE: &solution ThunderbirdsBoardGameEngine.sln
  IMAGE_NAME: &image_name "thunderbirds-app"
  SMOKE_IMAGE_NAME: &smoke_image_name "thunderbirds-smoke-tests"
  BASE_URL: &base_url "http://localhost:8080"
  
jobs:
  static-analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      solution_file: *solution

  build:
    uses: ./.github/workflows/build.yml
    with:
      solution_file: *solution
    needs:
      - static-analysis

  docker-build-app:
    if: github.event_name == 'push'
    uses: ./.github/workflows/build-docker.yml
    with:
      image_name: *image_name
      dockerfile_path: "src/Api/ThunderbirdsBoardGameEngine.Api/Dockerfile"
      docker_build_context: "."
    needs:
      - static-analysis

  tests:
    uses: ./.github/workflows/tests-dotnet.yml
    with:
      solution_file: *solution
      run_component: true
    needs:
      - build

  tests-docker:
    if: github.event_name == 'push'
    uses: ./.github/workflows/tests-docker.yml
    with:
      solution_file: *solution
      image_name: *image_name
      run_integration: true
      run_playwright: true
      base_url: *base_url
    needs:
      - build
      - docker-build-app

  compute-version:
    if: github.event_name == 'push'
    uses: ./.github/workflows/version.yml
    with:
      pr_title: ${{ github.event.pull_request.title || github.event.head_commit.message }}
    needs:
      - tests
      - tests-docker

  tag-repo:
    if: github.ref == 'refs/heads/main' && needs.compute-version.outputs.release_type != 'none'
    uses: ./.github/workflows/tag-repo.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      tag_prefix: "server/v"
    needs:
      - compute-version

  docker-publish-app:
    if: github.event_name == 'push' && needs.compute-version.outputs.release_type != 'none'
    uses: ./.github/workflows/publish-docker.yml
    with:
      image_name: *image_name
      version: ${{ needs.compute-version.outputs.version }}
      push_latest: ${{ github.ref == 'refs/heads/main' }}
    secrets:
      registry_token: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - docker-build-app
      - compute-version

  publish-packages:
    strategy:
      matrix:
        package:
          - name: ReferenceData.Runtime
            project_path: src/ReferenceData/ThunderbirdsBoardGameEngine.ReferenceData.Runtime/ThunderbirdsBoardGameEngine.ReferenceData.Runtime.csproj
            package_id: ThunderbirdsBoardGameEngine.ReferenceData.Runtime

          - name: Rules.Contracts
            project_path: src/Rules/ThunderbirdsBoardGameEngine.Rules.Contracts/ThunderbirdsBoardGameEngine.Rules.Contracts.csproj
            package_id: ThunderbirdsBoardGameEngine.Rules.Contracts

          - name: Rules.Client
            project_path: src/Rules/ThunderbirdsBoardGameEngine.Rules.Client/ThunderbirdsBoardGameEngine.Rules.Client.csproj
            package_id: ThunderbirdsBoardGameEngine.Rules.Client

          - name: Rules.WireMock
            project_path: tools/Rules/ThunderbirdsBoardGameEngine.Rules.WireMock/ThunderbirdsBoardGameEngine.Rules.WireMock.csproj
            package_id: ThunderbirdsBoardGameEngine.Rules.WireMock

    name: Package → ${{ matrix.package.name }}
    if: github.event_name == 'push' && needs.compute-version.outputs.release_type != 'none'
    uses: ./.github/workflows/package-lifecycle.yml
    with:
      project_path: ${{ matrix.package.project_path }}
      package_id: ${{ matrix.package.package_id }}
    needs:
      - compute-version

  deploy:
    name: Deploy Application
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    with:
      image_name: *image_name
      image_tag: ${{ needs.docker-publish-app.outputs.image_tag }}
      environment: "dev"
    secrets: inherit
    needs:
      - docker-publish-app

  smoke-tests:
    name: Run Smoke Tests
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/smoke-tests.yml
    with:
      deployment_uri: ${{ needs.deploy.outputs.deployment_uri }}
      image_tag: ${{ vars.SMOKE_IMAGE_TAG || 'latest' }}
    needs:
      - deploy
