name: CI - PR/Branch

on:
  push:
    branches-ignore:
      - main
  pull_request:

env:
  SOLUTION_FILE: ThunderbirdsBoardGameEngine.sln

jobs:
  build:
    uses: ./.github/workflows/build.yml   # 👈 call the reusable workflow
    with:
      solution_file: ${{ env.SOLUTION_FILE }}

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Unit Tests
        shell: bash
        run: |
          set -e
          echo "🚀 Running all Unit Tests..."
          dotnet test "$SOLUTION_FILE" \
            --configuration Release \
            --logger:"trx;LogFileName=unit-${RUNNER_OS}.trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~UnitTests"
                
      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/Unit
          retention-days: 7

  component-tests:
    name: Run Component Tests
    runs-on: ubuntu-latest
    needs: [build, unit-tests]

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Component Tests
        run: |
          set -e
          echo "🚀 Running all Component Tests..."
          dotnet test $SOLUTION_FILE \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~ComponentTests"
                
      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: component-test-results
          path: ./TestResults/Component
          retention-days: 7
