name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  dotnet-build:
    name: Build .NET Solution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - run: dotnet restore ThunderbirdsBoardGameEngine.sln
      - run: dotnet build ThunderbirdsBoardGameEngine.sln --configuration Release --no-restore

  unit-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: dotnet-build
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - run: |
          find . -name "*UnitTests.csproj" -exec dotnet test {} --configuration Release \;

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: dotnet-build
    steps:
      - uses: actions/checkout@v3
      - run: docker build -t thunderbirds-api .

  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - run: |
          docker run -d -p 8080:8080 --name thunderbirds-api-test thunderbirds-api
          sleep 5
      - run: |
          find . -name "*IntegrationTests.csproj" -exec dotnet test {} --configuration Release \;
          find . -name "*DataAccessTests.csproj" -exec dotnet test {} --configuration Release \;
      - if: always()
        run: docker rm -f thunderbirds-api-test
