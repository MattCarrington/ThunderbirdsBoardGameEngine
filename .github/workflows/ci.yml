name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  SOLUTION_FILE: ThunderbirdsBoardGameEngine.sln

jobs:
  build:
    name: Build .NET Solution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore & Build
        run: |
          dotnet restore $SOLUTION_FILE
          dotnet build $SOLUTION_FILE --configuration Release --no-restore

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t thunderbirds-api -f ThunderbirdsBoardGameEngine.Api/Dockerfile .

      - name: Save Docker Image
        run: docker save thunderbirds-api -o thunderbirds-api.tar
      
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderbirds-api-image
          path: thunderbirds-api.tar
          retention-days: 7

  unit-tests:
    name: Run Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: { os: [ubuntu-latest, windows-latest] }
    needs: build

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Unit Tests
        shell: bash
        run: |
          set -e
          echo "🚀 Running all Unit Tests..."
          dotnet test "$SOLUTION_FILE" \
            --configuration Release \
            --logger:"trx;LogFileName=unit-${RUNNER_OS}.trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~UnitTests"
                
      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/Unit
          retention-days: 7

  component-tests:
    name: Run Component Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Component Tests
        run: |
          set -e
          echo "🚀 Running all Component Tests..."
          dotnet test $SOLUTION_FILE \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~ComponentTests"
                
      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: component-test-results
          path: ./TestResults/Component
          retention-days: 7

  integration-tests:
    name: Run Integration
    runs-on: ubuntu-latest
    needs: [build, docker-build]

    env:
      CatalogBaseUrl: "http://localhost:8080"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: thunderbirds-api-image
          path: .
      
      - name: Load Docker Image
        run: docker load -i thunderbirds-api.tar

      - name: Bring up API with docker compose
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          docker compose \
            -f Docker/docker-compose.yml \
            -f Docker/docker-compose.test.yml \
            up -d --build
      
      - name: Wait for readiness
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health/ready >/dev/null; then
              echo "API is healthy!"; break
            fi
            echo "API not ready yet... ($i/60)"
            sleep 2
          done

      - name: Run Integration Tests
        run: |
          set -e
          echo "🚀 Running all Integration Tests..."
          dotnet test $SOLUTION_FILE \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults/Integration \
            --filter "FullyQualifiedName~IntegrationTests"

      - if: always()
        name: Tear Down Docker Container
        run: docker rm -f thunderbirds-api-test

      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./TestResults/Integration
          retention-days: 7

  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests, integration-tests]

    env:
      BASE_URL: "http://localhost:8080"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Reuse the built API image artifact so docker-compose uses the same image
      - name: Download API Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: thunderbirds-api-image
          path: .

      - name: Load Docker Image
        run: docker load -i thunderbirds-api.tar

      - name: Bring up app with docker compose
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          docker compose \
            -f Docker/docker-compose.yml \
            -f Docker/docker-compose.test.yml \
            up -d --build

      - name: Wait for readiness
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health/ready >/dev/null; then
              echo "App is healthy!"; break
            fi
            echo "App not ready yet... ($i/60)"
            sleep 2
          done

      - name: Install Playwright CLI & browsers
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI
          playwright install

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          dotnet test $SOLUTION_FILE \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults/Playwright \
            --filter "FullyQualifiedName~PlaywrightTests"

      - name: Upload Playwright test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: ./TestResults/Playwright
          retention-days: 7

      - name: Tear down docker compose
        if: always()
        run: |
          set -euo pipefail
          unset COMPOSE_FILE
          docker compose \
            -f Docker/docker-compose.yml \
            -f Docker/docker-compose.test.yml \
            down -v