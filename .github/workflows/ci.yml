name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Build .NET Solution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore & Build
        run: |
          dotnet restore ThunderbirdsBoardGameEngine.sln
          dotnet build ThunderbirdsBoardGameEngine.sln --configuration Release --no-restore

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t thunderbirds-api -f ThunderbirdsBoardGameEngine.GameData.Api/Dockerfile .

      - name: Save Docker Image
        run: docker save thunderbirds-api -o thunderbirds-api.tar
      
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderbirds-api-image
          path: thunderbirds-api.tar
          retention-days: 7

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Unit Tests
        run: |
          set -e
          echo "🚀 Running all Unit Tests..."
          dotnet test \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults \
            --filter "FullyQualifiedName~UnitTests"
                
      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/Unit
          retention-days: 7

  integration-tests:
    name: Run Integration
    runs-on: ubuntu-latest
    needs: [build, docker-build]

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: thunderbirds-api-image
          path: .
      
      - name: Load Docker Image
        run: docker load -i thunderbirds-api.tar

      - name: Run API Docker Container
        run: |
          docker run -d -p 8080:8080 --name thunderbirds-api-test thunderbirds-api

          # Wait until health check passes
          echo "Waiting for API to become healthy..."
          for i in {1..30}; do
              if curl -fs http://localhost:8080/health/ready > /dev/null; then
              echo "API is healthy!"
              break
              fi
              echo "API not ready yet... retrying ($i/30)"
              sleep 1
          done

      - name: Run Integration Tests
        run: |
          set -e
          echo "🚀 Running all Integration Tests..."
          dotnet test \
            --configuration Release \
            --logger:"trx" \
            --results-directory ./TestResults/Integration \
            --filter "FullyQualifiedName~IntegrationTests"

      - if: always()
        name: Tear Down Docker Container
        run: docker rm -f thunderbirds-api-test

      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./TestResults/Integration
          retention-days: 7
