name: CI

on:
  pull_request:
  push:
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
permissions:
  contents: write
  actions: read
  packages: write

env:
  SOLUTION_FILE: &solution ThunderbirdsBoardGameEngine.sln
  IMAGE_NAME: &image_name "thunderbirds-app"
  BASE_URL: &base_url "http://localhost:8080"
  
jobs:
  static-analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      solution_file: *solution

  build:
    uses: ./.github/workflows/build.yml
    with:
      solution_file: *solution
      image_name: *image_name
      docker_build: ${{ github.event_name == 'push' }}
    needs:
      - static-analysis  

  tests:
    uses: ./.github/workflows/tests.yml
    with:
      solution_file: *solution
      image_name: *image_name
      run_component: true
      run_integration: ${{ github.event_name == 'push' }}
      run_playwright: ${{ github.event_name == 'push' }}
      base_url: *base_url
    needs:
      - build

  compute-version:
    if: github.event_name == 'push'
    uses: ./.github/workflows/version.yml
    with:
      pr_title: ${{ github.event.pull_request.title || github.event.head_commit.message }}
    needs:
      - tests

  tag-repo:
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/tag-repo.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      tag_prefix: "server/v"
    needs:
      - compute-version

  docker_publish:
    if: github.event_name == 'push'
    uses: ./.github/workflows/publish-docker.yml
    with:
      image_name: *image_name
      version: ${{ needs.compute-version.outputs.version }}
      push_latest: ${{ github.ref == 'refs/heads/main' }}
    secrets:
      registry_token: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - compute-version

  publish-packages:
    strategy:
      matrix:
        package:
          - name: Catalog.Contracts
            project_path: src/Catalog/ThunderbirdsBoardGameEngine.Catalog.Contracts/ThunderbirdsBoardGameEngine.Catalog.Contracts.csproj
            package_id: ThunderbirdsBoardGameEngine.Catalog.Contracts

          - name: Catalog.Client
            project_path: src/Catalog/ThunderbirdsBoardGameEngine.Catalog.Client/ThunderbirdsBoardGameEngine.Catalog.Client.csproj
            package_id: ThunderbirdsBoardGameEngine.Catalog.Client

          - name: Catalog.WireMock
            project_path: tools/Catalog/ThunderbirdsBoardGameEngine.Catalog.WireMock/ThunderbirdsBoardGameEngine.Catalog.WireMock.csproj
            package_id: ThunderbirdsBoardGameEngine.Catalog.WireMock

          - name: Rules.Contracts
            project_path: src/Rules/ThunderbirdsBoardGameEngine.Rules.Contracts/ThunderbirdsBoardGameEngine.Rules.Contracts.csproj
            package_id: ThunderbirdsBoardGameEngine.Rules.Contracts

          - name: Rules.Client
            project_path: src/Rules/ThunderbirdsBoardGameEngine.Rules.Client/ThunderbirdsBoardGameEngine.Rules.Client.csproj
            package_id: ThunderbirdsBoardGameEngine.Rules.Client

          - name: Rules.WireMock
            project_path: tools/Rules/ThunderbirdsBoardGameEngine.Rules.WireMock/ThunderbirdsBoardGameEngine.Rules.WireMock.csproj
            package_id: ThunderbirdsBoardGameEngine.Rules.WireMock

    name: Package → ${{ matrix.package.name }}
    if: github.event_name == 'push'
    uses: ./.github/workflows/package-lifecycle.yml
    with:
      project_path: ${{ matrix.package.project_path }}
      package_id: ${{ matrix.package.package_id }}
    needs:
      - compute-version
