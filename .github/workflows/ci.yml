name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Build .NET Solution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore & Build
        run: |
          dotnet restore ThunderbirdsBoardGameEngine.sln
          dotnet build ThunderbirdsBoardGameEngine.sln --configuration Release --no-restore

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t thunderbirds-api -f ThunderbirdsBoardGameEngine.GameData.Api/Dockerfile .

      - name: Save Docker Image
        run: docker save thunderbirds-api -o thunderbirds-api.tar
      
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: thunderbirds-api-image
          path: thunderbirds-api.tar
          retention-days: 7

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run Unit Tests
        run: |
          find . -name "*UnitTests.csproj" -exec dotnet test {} --logger:"trx" --results-directory ./TestResults --configuration Release --no-restore \;

      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7

  integration-tests:
    name: Run Integration
    runs-on: ubuntu-latest
    needs: [build, docker-build]

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: thunderbirds-api-image
          path: .
      
      - name: Load Docker Image
        run: docker load -i thunderbirds-api.tar

      - name: Run API Docker Container
        run: |
          docker run -d -p 8080:8080 --name thunderbirds-api-test thunderbirds-api
          sleep 5

      - name: Run Integration Tests
        run: |
          find . -name "*IntegrationTests.csproj" -exec dotnet test {} --logger:"trx" --results-directory ./TestResults --configuration Release --no-restore \;

      - if: always()
        name: Tear Down Docker Container
        run: docker rm -f thunderbirds-api-test

      - name: Upload Test Results
        if: failure()  # Only upload if the tests failed
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7
