name: CI - PR/Branch

on:
  push:
    branches-ignore:
      - main
  pull_request:

env:
  SOLUTION_FILE: &solution ThunderbirdsBoardGameEngine.sln
  BASE_URL: &base_url "http://localhost:8080"

jobs:
  static-analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      solution_file: *solution

  build:
    uses: ./.github/workflows/build.yml
    with:
      solution_file: *solution
      docker_build: true # switch to false later
    needs:
      - static-analysis  

  start-docker-env: # remove after testing
    uses: ./.github/workflows/docker-env.yml
    with:
      api_url: *base_url
    needs: build

  tests:
    uses: ./.github/workflows/tests.yml
    with:
      solution_file: *solution
      run_component: true
      run_integration: true # swtich back to false later
      run_playwright: true
    needs:
      #- Build
      - start-docker-env

  teardown-docker-env: # remove after testing
    uses: ./.github/workflows/docker-teardown.yml
    needs: 
      - tests