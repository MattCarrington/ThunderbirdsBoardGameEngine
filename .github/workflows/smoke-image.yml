name: Smoke Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tests/SmokeTests/**
      - Directory.Packages.props
      - github/workflows/smoke-image.yml
      
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect-smoke-image-change:
    uses: ./.github/workflows/detect.yml
    with:
      path_prefix: tests/SmokeTests
      package_regex: xunit|microsoft\.net\.test\.sdk|testcontainers|docker\.dotnet|coverlet

  compute-version:
    uses: ./.github/workflows/version.yml
    with:
      pr_title: ${{ github.event.head_commit.message || github.ref_name || 'chore smoke image' }}
      tag_prefix: smoke/v
  
        
  docker-build-smoke:
    uses: ./.github/workflows/build-docker.yml
    with:
      image_name: thunderbirds-smoke-tests
      dockerfile_path: tests/SmokeTests/ThunderbirdsBoardGameEngine.SmokeTests/Dockerfile
      docker_build_context: .

  docker-publish-smoke:
    if: needs.compute-version.outputs.release_type != 'none'
    uses: ./.github/workflows/publish-docker.yml
    with:
      image_name: thunderbirds-smoke-tests
      version: ${{ needs.compute-version.outputs.version }}
      push_latest: ${{ github.ref == 'refs/heads/main' }}
    secrets:
      registry_token: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - compute-version
      - docker-build-smoke

  tag-smoke:
    if: github.ref == 'refs/heads/main' && needs.compute-version.outputs.release_type != 'none'
    permissions:
      contents: write
    uses: ./.github/workflows/tag-repo.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      tag_prefix: "smoke/v"      
    needs:
      - compute-version
      - docker-publish-smoke

  update-smoke-image-tag:
    if: github.ref == 'refs/heads/main' && needs.docker-publish-smoke.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    needs:
      - docker-publish-smoke
      - compute-version
    steps:
      - name: Update SMOKE_IMAGE_TAG repo variable
        run: |
          gh variable set SMOKE_IMAGE_TAG \
            --repo ${{ github.repository }} \
            --body "${{ needs.compute-version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
