name: Smoke Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tests/SmokeTests/**
      - Directory.Packages.props
      - Directory.Build.props
      - Directory.Build.targets
      - global.json
      - NuGet.config
      - .github/workflows/smoke-image.yml
      - .github/workflows/detect.yml
      - .github/workflows/build-and-publish-docker.yml
      - .github/workflows/compute-asset-version.yml
      - .github/workflows/tag-repo.yml
      
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect-change:
    uses: ./.github/workflows/detect.yml
    with:
      event_name: ${{ github.event_name }}
      before_sha: ${{ github.event.before }}
      after_sha: ${{ github.sha }}
      path_prefix: tests/SmokeTests
      package_regex: xunit|microsoft\.net\.test\.sdk|testcontainers|docker\.dotnet|coverlet

  compute-version:
    if: needs.detect-change.outputs.should_build == 'true'
    uses: ./.github/workflows/compute-asset-version.yml
    with:
      tag_prefix: smoke/v
      image_tag_prefix: smoke-
    needs:
      - detect-change
        
  docker-build-publish:
    uses: ./.github/workflows/build-and-publish-docker.yml
    with:
      image_name: thunderbirds-smoke-tests
      dockerfile_path: tests/SmokeTests/ThunderbirdsBoardGameEngine.SmokeTests/Dockerfile
      docker_build_context: .
      image_tag: ${{ needs.compute-version.outputs.image_tag }}
      version_tag: smoke-v${{ needs.compute-version.outputs.version }}
      push_latest: ${{ github.ref == 'refs/heads/main' }}
    secrets:
      registry_token: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - compute-version

  tag-smoke:
    if: github.ref == 'refs/heads/main' && needs.docker-build-publish.result == 'success'
    permissions:
      contents: write
    uses: ./.github/workflows/tag-repo.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      tag_prefix: "smoke/v"
    needs:
      - compute-version
      - docker-build-publish

  update-smoke-image-tag:
    if: github.ref == 'refs/heads/main' && needs.docker-build-publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Update SMOKE_IMAGE_TAG repo variable
        run: |
          gh variable set SMOKE_IMAGE_TAG \
            --repo ${{ github.repository }} \
            --body "${{ needs.compute-version.outputs.image_tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    needs:
      - compute-version
      - docker-build-publish
