name: Deploy

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string
    outputs:
      deployment_uri:
        description: The URI of the deployed application
        value: ${{ jobs.deploy.outputs.deployment_uri }}
    secrets:
      azure_credentials:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deployment_uri: ${{ steps.get-uri.outputs.deployment_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Pulumi
        uses: pulumi/actions@v4
        with:
          command: login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Deploy to Azure
        run: |
          pulumi up --yes --stack ${{ inputs.environment }} \
            -c "image=${{ inputs.image_name }}:${{ inputs.image_tag }}"
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Get Deployment URI
        id: get-uri
        run: |
          # Fetch the deployment URI from Pulumi stack output
          DEPLOYMENT_URI=$(pulumi stack output deploymentUri)
          echo "deployment_uri=$DEPLOYMENT_URI" >> $GITHUB_OUTPUT
