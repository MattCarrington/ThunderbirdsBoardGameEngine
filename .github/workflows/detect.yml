name: Detect Changes (reusable)

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      before_sha:
        required: false
        type: string
        default: ""
      after_sha:
        required: true
        type: string
      path_prefix:
        required: true
        type: string
      package_regex:
        required: true
        type: string
    outputs:
      should_build:
        description: "Whether the smoke test image should be built and published"
        value: ${{ jobs.detect.outputs.should_build }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.detect_changes.outputs.should_build }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 

      - name: Detect changes in smoke test files
        id: detect_changes
        shell: bash
        run: |
          set -euo pipefail

          echo "should_build=false" >> "$GITHUB_OUTPUT"

          # Manual dispatch should always build.
          if [ "${{ inputs.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ inputs.event_name }}" = "push" ]; then
            before="${{ inputs.before_sha }}"
            after="${{ inputs.after_sha }}"

            if [[ "$before" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$after")"
              package_diff="$(git show --format= --unified=0 "$after" -- Directory.Packages.props || true)"
            else
              changed_files="$(git diff --name-only "$before" "$after")"
              package_diff="$(git diff --unified=0 "$before" "$after" -- Directory.Packages.props || true)"
            fi
          else
            changed_files="$(git diff --name-only HEAD^ HEAD)"
            package_diff="$(git diff --unified=0 HEAD^ HEAD -- Directory.Packages.props || true)"
          fi

          echo "Changed files:"
          echo "$changed_files"

          # Smoke test source or docker inputs changed.
          if echo "$changed_files" | grep -Eq '^${{ inputs.path_prefix }}/'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # SDK/build infrastructure affecting the image.
          if echo "$changed_files" | grep -Eq '^(global\.json|NuGet\.config|Directory\.Build\.props|Directory\.Build\.targets)$'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Workflow logic changed.
          if echo "$changed_files" | grep -Eq '^\.github/workflows/(smoke-image|detect|build-and-publish-docker|compute-asset-version|tag-repo|build-docker|publish-docker|version)\.yml$'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Root package props changed. Only rebuild for smoke-relevant package changes.
          if echo "$changed_files" | grep -q '^Directory\.Packages\.props$'; then
            package_changed_lines="$(printf '%s\n' "$package_diff" | grep -E '^[+-][^+-]' || true)"
            if printf '%s\n' "$package_changed_lines" | grep -Eiq '${{ inputs.package_regex }}'; then
              echo "should_build=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
