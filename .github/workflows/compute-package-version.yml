name: Compute Package Version

on:
  workflow_call:
    inputs:
      project_path:
        description: Path to the .csproj
        required: true
        type: string
      package_id:
        description: NuGet package ID
        required: true
        type: string
    outputs:
      version:
        description: Computed package version
        value: ${{ jobs.compute.outputs.version }}
      should_publish:
        description: Whether the package should be published
        value: ${{ jobs.compute.outputs.should_publish }}

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    outputs:
      version: ${{ steps.compute.outputs.version }}
      should_publish: ${{ steps.compute.outputs.should_publish }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Compute package version
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_ID="${{ inputs.package_id }}"
          PROJECT_PATH="${{ inputs.project_path }}"
          OWNER="${{ github.repository_owner }}"

          BASE_VERSION=$(dotnet msbuild "$PROJECT_PATH" \
            -getProperty:Version -nologo)

          echo "Base version from csproj: $BASE_VERSION"
          echo "Package ID: $PACKAGE_ID"

          # --------------------------------------------------
          # PHASE 1: Read package feed (THIS IS WHERE PAGINATION LIVES)
          # --------------------------------------------------

          FOUND=false
          PAGE=1

          while true; do
            echo "Fetching package versions (page $PAGE)..."

            RESPONSE=$(curl -sSf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/${OWNER}/packages/nuget/${PACKAGE_ID}/versions?per_page=100&page=${PAGE}")

            COUNT=$(echo "$RESPONSE" | jq 'length')

            # No more pages
            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            # Print what we saw (useful for debugging)
            echo "$RESPONSE" | jq -r '.[].name'

            # Check for exact stable version match
            if echo "$RESPONSE" | jq -e ".[] | select(.name == \"${BASE_VERSION}\")" > /dev/null; then
              FOUND=true
              break
            fi

            PAGE=$((PAGE + 1))
          done

          # --------------------------------------------------
          # PHASE 2: Decision
          # --------------------------------------------------

          if [ "$FOUND" = true ]; then
            echo "Stable version $BASE_VERSION already exists."
            echo "Version line is closed. Do not publish."

            echo "version=" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No stable version found. Publishing allowed."
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

          # --------------------------------------------------
          # PHASE 3: Compute the version string
          # --------------------------------------------------

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            FINAL_VERSION="$BASE_VERSION"
            echo "main branch → stable version $FINAL_VERSION"
          else
            FINAL_VERSION="$BASE_VERSION-beta.${GITHUB_RUN_NUMBER}"
            echo "branch → prerelease version $FINAL_VERSION"
          fi

          echo "version=$FINAL_VERSION" >> "$GITHUB_OUTPUT"
