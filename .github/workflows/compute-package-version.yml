name: Compute Package Version

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
      package_id:
        required: true
        type: string
    outputs:
      version:
        value: ${{ jobs.compute.outputs.version }}
      should_publish:
        value: ${{ jobs.compute.outputs.should_publish }}

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read

    outputs:
      version: ${{ steps.compute.outputs.version }}
      should_publish: ${{ steps.compute.outputs.should_publish }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Compute package version
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_ID="${{ inputs.package_id }}"
          BASE_VERSION=$(dotnet msbuild "${{ inputs.project_path }}" -getProperty:Version -nologo)

          echo "Base version: $BASE_VERSION"
          echo "Package ID: $PACKAGE_ID"

          OWNER="${{ github.repository_owner }}"

          echo "Querying GitHub Packages API..."

          VERSIONS_JSON=$(curl -sSf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${OWNER}/packages/nuget/${PACKAGE_ID}/versions")

          echo "$VERSIONS_JSON" | jq -r '.[].name'

          if echo "$VERSIONS_JSON" | jq -e ".[] | select(.name == \"${BASE_VERSION}\")" > /dev/null; then
            echo "Version $BASE_VERSION already released."
            echo "Version line is closed. Nothing to publish."

            echo "version=" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            FINAL_VERSION="$BASE_VERSION"
          else
            FINAL_VERSION="$BASE_VERSION-beta.${GITHUB_RUN_NUMBER}"
          fi

          echo "version=$FINAL_VERSION" >> "$GITHUB_OUTPUT"

