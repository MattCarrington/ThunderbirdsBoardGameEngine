name: Compute Package Version

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
      package_id:
        required: true
        type: string
    outputs:
      version:
        value: ${{ jobs.compute.outputs.version }}
      should_publish:
        value: ${{ jobs.compute.outputs.should_publish }}

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read

    outputs:
      version: ${{ steps.compute.outputs.version }}
      should_publish: ${{ steps.compute.outputs.should_publish }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install NuGet CLI
        run: |
          curl -sSL https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -o nuget.exe

      - name: Compute package version
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_ID="${{ inputs.package_id }}"
          FEED="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          # Authenticate GitHub Packages for READ access
          dotnet nuget remove source github 2>/dev/null || true
          dotnet nuget add source "$FEED" \
            --name github \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

          BASE_VERSION=$(dotnet msbuild "${{ inputs.project_path }}" \
            -getProperty:Version -nologo)

          echo "Base version: $BASE_VERSION"
          echo "Package ID: $PACKAGE_ID"

          echo "Visible versions in GitHub Packages:"
          mono ./nuget.exe list "$PACKAGE_ID" -Source github -AllVersions || true

          # -------------------------------------------------
          # STOP GUARD — close version line if stable exists
          # -------------------------------------------------
          if mono ./nuget.exe list "$PACKAGE_ID" -Source github -AllVersions \
              | grep -Eq " ${BASE_VERSION}($| )"; then
            echo "Version $BASE_VERSION already released."
            echo "Version line is closed. Nothing to publish."

            echo "version=" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # -------------------------------------------------

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            FINAL_VERSION="$BASE_VERSION"
            echo "main → closing release $FINAL_VERSION"
          else
            FINAL_VERSION="$BASE_VERSION-beta.${GITHUB_RUN_NUMBER}"
            echo "branch → prerelease $FINAL_VERSION"
          fi

          echo "version=$FINAL_VERSION" >> "$GITHUB_OUTPUT"
