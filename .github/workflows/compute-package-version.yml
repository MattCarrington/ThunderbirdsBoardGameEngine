name: Compute Package Version

on:
  workflow_call:
    inputs:
      project_path:
        description: "Path to the .csproj"
        required: true
        type: string
      package_id:
        description: "NuGet package ID"
        required: false
        type: string        
    outputs:
      version:
        description: "Computed package version"
        value: ${{ jobs.compute-package-version.outputs.version }}
        

jobs:
  compute-package-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Compute package version
        id: compute
        run: |
          set -e

          BASE_VERSION=$(dotnet msbuild "${{ inputs.project_path }}" \
            -getProperty:Version -nologo)

          echo "Base version from csproj: $BASE_VERSION"

          FEED="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          PACKAGE_ID="${{ inputs.package_id }}"

          echo "Checking if $PACKAGE_ID $BASE_VERSION already exists..."

          if dotnet nuget search "$PACKAGE_ID" \
              --source "$FEED" \
              --exact-match \
              | grep -q " $BASE_VERSION "; then
            echo "Version $BASE_VERSION already released → skipping publish"
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            FINAL_VERSION="$BASE_VERSION"
            echo "Main branch → stable version $FINAL_VERSION"
          else
            FINAL_VERSION="$BASE_VERSION-beta.${GITHUB_RUN_NUMBER}"
            echo "Feature branch → prerelease $FINAL_VERSION"
          fi

          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT

