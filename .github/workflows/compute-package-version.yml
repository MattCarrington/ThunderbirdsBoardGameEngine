name: Compute Package Version

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
      package_id:
        required: true
        type: string
    outputs:
      version:
        value: ${{ jobs.compute.outputs.version }}
      should_publish:
        value: ${{ jobs.compute.outputs.should_publish }}

jobs:
  compute:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      should_publish: ${{ steps.compute.outputs.should_publish }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GitHub Packages
        run: |
          dotnet nuget remove source github 2>/dev/null || true
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

      - name: Compute package version
        id: compute
        run: |
          # set -e
          set -euo pipefail

          PACKAGE_ID="${{ inputs.package_id }}"
          FEED="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          BASE_VERSION=$(dotnet msbuild "${{ inputs.project_path }}" -getProperty:Version -nologo)

          echo "Base version: $BASE_VERSION"
          echo "Package ID: $PACKAGE_ID"

          echo "Visible versions:"
          nuget list "$PACKAGE_ID" -Source github -AllVersions || true

          # --- STOP GUARD ---
          if nuget list "$PACKAGE_ID" -Source github -AllVersions \
              | grep -Eq " ${BASE_VERSION}($| )"; then
            echo "Version $BASE_VERSION already released."
            echo "Version line is closed. Nothing to publish."
            echo "version=" >> $GITHUB_OUTPUT
            echo "should_publish=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # ------------------

          echo "should_publish=true" >> $GITHUB_OUTPUT

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            FINAL_VERSION="$BASE_VERSION"
          else
            FINAL_VERSION="$BASE_VERSION-beta.${GITHUB_RUN_NUMBER}"
          fi

          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT