name: Compute Server Version (reusable)

on:
  workflow_call:
    inputs:
      pr_title:
        description: "The title of the pull request or commit message"
        required: true
        type: string
    outputs:
      version:
        description: "Calculated server version"
        value: ${{ jobs.compute.outputs.version }}

jobs:
  compute:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute_version.outputs.version }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version
        id: compute_version
        run: |
          PR_TITLE="${{ inputs.pr_title }}"

          echo "PR Title: $PR_TITLE"

          # Find last server tag
          LAST_TAG=$(git tag --list 'server/v*' | sort -V | tail -n1)

          if [ -z "$LAST_TAG" ]; then
            LAST_VERSION="0.0.0"
            RANGE_ARG=""
            echo "No tag found, starting from 0.0.0"
          else
            LAST_VERSION=${LAST_TAG#server/v}
            RANGE_ARG="$LAST_TAG..HEAD"
            echo "Found last tag: $LAST_TAG"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"

          if [[ "$PR_TITLE" =~ BREAKING\ CHANGE || "$PR_TITLE" =~ "!:" ]]; then
            BUMP="major"
          elif [[ "$PR_TITLE" =~ ^feat ]]; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "Determined bump type: $BUMP"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Calculated version: $NEXT_VERSION"

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            NEXT_VERSION="${NEXT_VERSION}-beta.${GITHUB_RUN_NUMBER}"
            echo "Beta prerelease version applied: $NEXT_VERSION"
          else
            echo "Main branch detected — producing stable version"
          fi

          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
