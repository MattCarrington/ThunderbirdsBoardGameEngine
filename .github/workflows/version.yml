name: Compute Version (reusable)

on:
  workflow_call:
    inputs:
      pr_title:
        description: "The title of the pull request or commit message"
        required: true
        type: string
      tag_prefix:
        description: "Tag prefix to use when computing the version stream"
        required: false
        type: string
        default: "server/v"
    outputs:
      version:
        description: "Calculated server version"
        value: ${{ jobs.compute.outputs.version }}
      release_type:
        value: ${{ jobs.compute.outputs.release_type }}
        description: "Type of release (major, minor, patch, none)"

jobs:
  compute:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute_version.outputs.version }}
      release_type: ${{ steps.compute_version.outputs.release_type }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute version
        id: compute_version
        run: |
          PR_TITLE="${{ inputs.pr_title }}"
          TAG_PREFIX="${{ inputs.tag_prefix }}"

          echo "PR Title: $PR_TITLE"
          echo "Tag prefix: $TAG_PREFIX"

          # Find last tag in the configured stream.
          LAST_TAG=$(git tag --list "${TAG_PREFIX}*" | sort -V | tail -n1)

          if [ -z "$LAST_TAG" ]; then
            LAST_VERSION="0.0.0"
            RANGE_ARG=""
            echo "No tag found, starting from 0.0.0"
          else
            LAST_VERSION=${LAST_TAG#${TAG_PREFIX}}
            RANGE_ARG="$LAST_TAG..HEAD"
            echo "Found last tag: $LAST_TAG"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"

          if [[ "$PR_TITLE" =~ BREAKING\ CHANGE || "$PR_TITLE" =~ "!:" ]]; then
            RELEASE_TYPE="major"
          elif [[ "$PR_TITLE" =~ ^feat ]]; then
            RELEASE_TYPE="minor"
          elif [[ "$PR_TITLE" =~ ^fix || "$PR_TITLE" =~ ^perf || "$PR_TITLE" =~ ^chore ]]; then
            RELEASE_TYPE="patch"
          else
            RELEASE_TYPE="none"
          fi

          echo "Determined release type: $RELEASE_TYPE"

          if [ "$RELEASE_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$RELEASE_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$RELEASE_TYPE" = "patch" ]; then
            PATCH=$((PATCH + 1))
          else
            echo "No release required; keeping version $LAST_VERSION"
          fi

          NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Calculated version: $NEXT_VERSION"

          if [[ "$RELEASE_TYPE" != "none" && "${GITHUB_REF}" != "refs/heads/main" ]]; then
            NEXT_VERSION="${NEXT_VERSION}-beta.${GITHUB_RUN_NUMBER}"
            echo "Beta prerelease version applied: $NEXT_VERSION"
          else
            echo "Main branch detected — producing stable version"
          fi

          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT

