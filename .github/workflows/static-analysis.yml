name: Static Analysis (reusable)

on:
  workflow_call:
    inputs:
      solution_file:
        required: true
        type: string

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional but nice: ensure formatting is clean
      - name: Check code format
        run: |
          dotnet format "${{ inputs.solution_file }}" --verify-no-changes

      # Build with analyzers and treat warnings as errors
      - name: Build with analyzers
        run: |
          dotnet build "${{ inputs.solution_file }}" \
            --configuration Release \
