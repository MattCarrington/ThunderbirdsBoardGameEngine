name: Build & Publish Docker Image (reusable)
# This workflow builds and publishes a Docker image to GitHub Container Registry.
# For use when no steps in between are needed, such as for smoke test images.
# For more complex scenarios (e.g. needing to run tests before publishing), call the build and publish workflows separately.

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      docker_build_context:
        required: false
        type: string
        default: "."
      image_tag:
        required: true
        type: string
      version_tag:
        required: false
        type: string
        default: ""
      push_latest:
        required: false
        type: boolean
        default: false
    secrets:
      registry_token:
        required: false
    outputs:
      image_tag:
        value: ${{ jobs.docker-build-publish.outputs.image_tag }}
      image_ref:
        value: ${{ jobs.docker-build-publish.outputs.image_ref }}

jobs:
  docker-build-publish:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.publish.outputs.image_tag }}
      image_ref: ${{ steps.publish.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v6

      - name: Validate Docker Inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${{ inputs.dockerfile_path }}" ]; then
            echo "Dockerfile not found: ${{ inputs.dockerfile_path }}"
            exit 1
          fi

          if [ ! -d "${{ inputs.docker_build_context }}" ]; then
            echo "Docker build context must be an existing directory: ${{ inputs.docker_build_context }}"
            exit 1
          fi

          validate_docker_tag() {
            local name="$1"
            local tag="$2"

            if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "$name must be a valid Docker tag (letters, digits, underscores, periods, and dashes only): $tag"
              exit 1
            fi
          }

          validate_docker_tag "image_tag" "${{ inputs.image_tag }}"

          if [ -n "${{ inputs.version_tag }}" ]; then
            validate_docker_tag "version_tag" "${{ inputs.version_tag }}"
          fi

      - name: Docker Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.registry_token || github.token }}

      - name: Build, Tag and Push Image
        id: publish
        shell: bash
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.registry_token || github.token }}
        run: |
          set -euo pipefail

          image="${{ inputs.image_name }}"
          image_tag="${{ inputs.image_tag }}"
          version_tag="${{ inputs.version_tag }}"
          owner="${{ github.repository_owner }}"
          owner="${owner,,}"

          ghcr="ghcr.io/$owner/$image"

          docker build \
            --secret id=github_packages_token,env=GITHUB_PACKAGES_TOKEN \
            -t "$ghcr:$image_tag" \
            -f "${{ inputs.dockerfile_path }}" \
            "${{ inputs.docker_build_context }}"

          docker push "$ghcr:$image_tag"

          if [ -n "$version_tag" ]; then
            docker tag "$ghcr:$image_tag" "$ghcr:$version_tag"
            docker push "$ghcr:$version_tag"
          fi

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            docker tag "$ghcr:$image_tag" "$ghcr:latest"
            docker push "$ghcr:latest"
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$ghcr:$image_tag" >> "$GITHUB_OUTPUT"