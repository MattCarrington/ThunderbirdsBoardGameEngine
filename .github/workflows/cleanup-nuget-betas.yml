# NOTE:
# This workflow assumes a user-owned GitHub Packages feed.
# If the repository is moved to an organization, the API
# endpoint must switch from /users to /orgs.

name: Cleanup NuGet prerelease packages

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: NuGet package ID to clean up
        required: true
        type: string
      dry_run:
        description: Run in dry-run mode (no deletions)
        required: false
        default: true
        type: boolean
      confirm:
        description: Type "DELETE" to confirm deletions
        required: false
        default: ""
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Cleanup prereleases
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_ID="${{ inputs.package_id }}"
          DRY_RUN="${{ inputs.dry_run }}"
          OWNER="${{ github.repository_owner }}"

          echo "NuGet prerelease cleanup"
          echo "------------------------"
          echo "Package: $PACKAGE_ID"
          echo "Owner:   $OWNER"
          echo "Dry run: $DRY_RUN"
          echo

          API_URL_BASE="https://api.github.com/users/${OWNER}/packages/nuget/${PACKAGE_ID}/versions"
          PER_PAGE=100
          PAGE=1

          ALL_VERSIONS='[]'

          echo "Fetching package versions (paged)..."

          while :; do
            PAGE_URL="${API_URL_BASE}?per_page=${PER_PAGE}&page=${PAGE}"

            PAGE_JSON=$(curl -sS \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$PAGE_URL")

            # If GitHub returns an error object, fail fast with a useful message
            if echo "$PAGE_JSON" | jq -e 'type=="object" and has("message")' >/dev/null; then
              echo "GitHub API error:"
              echo "$PAGE_JSON" | jq -r '.message'
              echo "$PAGE_JSON" | jq -r '.documentation_url // empty'
              exit 1
            fi

            COUNT=$(echo "$PAGE_JSON" | jq 'length')
            echo "  Page ${PAGE}: ${COUNT} versions"

            if [[ "$COUNT" -eq 0 ]]; then
              break
            fi

            ALL_VERSIONS=$(jq -s '.[0] + .[1]' <(echo "$ALL_VERSIONS") <(echo "$PAGE_JSON"))
            PAGE=$((PAGE + 1))
          done

          VERSIONS_JSON="$ALL_VERSIONS"

          TOTAL=$(echo "$VERSIONS_JSON" | jq 'length')
          echo "Total versions fetched: $TOTAL"
          echo "Sample names:"
          echo "$VERSIONS_JSON" | jq -r '.[0:10] | .[]?.name'

          if [[ "$(echo "$VERSIONS_JSON" | jq 'length')" -eq 0 ]]; then
            echo "No versions found."
            exit 0
          fi

          declare -A STABLE_VERSIONS=()
          declare -a BETA_VERSIONS=()

          while read -r name id; do
            if [[ "$name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              STABLE_VERSIONS["$name"]="$id"

            elif [[ "$name" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta\..+$ ]]; then
              BASE_VERSION="${BASH_REMATCH[1]}"
              BETA_VERSIONS+=("$name|$id|$BASE_VERSION")
            fi
          done < <(echo "$VERSIONS_JSON" | jq -r '.[] | "\(.name) \(.id)"')

          echo
          echo "Stable versions:"
          if [[ "${#STABLE_VERSIONS[@]}" -eq 0 ]]; then
            echo "  (none)"
          else
            for v in "${!STABLE_VERSIONS[@]}"; do
              echo "  - $v"
            done
          fi

          if [[ "${#STABLE_VERSIONS[@]}" -eq 0 ]]; then
            echo
            echo "ERROR: No stable versions detected."
            echo "Refusing to delete prerelease packages."
            exit 1
          fi

          if [[ "$DRY_RUN" != "true" && "${{ inputs.confirm }}" != "DELETE" ]]; then
            echo "Real deletion mode requires confirmation. Please set the 'confirm' input to 'DELETE' or enable dry_run mode."
            exit 1
          fi

          echo
          echo "Eligible prerelease deletions:"
          FOUND=false

          for entry in "${BETA_VERSIONS[@]}"; do
            IFS="|" read -r name id base <<< "$entry"

            if [[ -n "${STABLE_VERSIONS[$base]:-}" ]]; then
              FOUND=true

              if [[ "$DRY_RUN" == "true" ]]; then
                echo "  DRY RUN: Would delete $name (stable $base exists)"
              else
                echo "  Deleting $name (stable $base exists)"
                curl -sSf -X DELETE \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/users/${OWNER}/packages/nuget/${PACKAGE_ID}/versions/${id}" || { echo "ERROR: Failed to delete $name (id: $id)"; exit 1; }
              fi
            fi
          done

          if [[ "$FOUND" == "false" ]]; then
            echo "  (none)"
          fi

          echo
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry-run complete. No deletions performed."
          else
            echo "Cleanup complete."
          fi
