name: Publish Docker Image (Reusable)

on:
  workflow_call:
    inputs:
      image_name:
        type: string
        required: true

      version:
        type: string
        required: true

      push_latest:
        type: boolean
        default: false

    secrets:
      github_token:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: thunderbirds-api-image

      - name: Load Docker image
        run: docker load -i thunderbirds-api.tar

      - name: Docker Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github_token || github.token }}

      - name: Tag Image
        run: |
          IMAGE="${{ inputs.image_name }}"
          VERSION="${{ inputs.version }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"

          GHCR="ghcr.io/${{ github.repository_owner }}/$IMAGE"

          docker tag "$IMAGE:$SHA_TAG" "$GHCR:$VERSION"
          docker tag "$IMAGE:$SHA_TAG" "$GHCR:$SHA_TAG"

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            docker tag "$IMAGE:$SHA_TAG" "$GHCR:latest"
          fi

      - name: Push Image
        run: |
          IMAGE="${{ inputs.image_name }}"
          VERSION="${{ inputs.version }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          GHCR="ghcr.io/${{ github.repository_owner }}/$IMAGE"

          docker push "$GHCR:$VERSION"
          docker push "$GHCR:$SHA_TAG"

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            docker push "$GHCR:latest"
          fi
