server {
  listen 80;
  root /usr/share/nginx/html;

  # Health (optional)
  location = /health/ready { return 200 "OK"; add_header Content-Type text/plain; }

  # Don’t cache the shell page
  location = /index.html { add_header Cache-Control "no-store" always; }

  # Long-cache only for fingerprinted assets
  location ~* \.(css|js|wasm|png|jpg|svg|ico)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # SPA fallback
  location / { try_files $uri /index.html; }

  # (Optional) proxy /api to backend
  # location /api/ { proxy_pass http://api:8080/; }
}
