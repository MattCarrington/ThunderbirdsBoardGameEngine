server {
  listen 80;
  root /usr/share/nginx/html;

  # Health for compose
  location = /health/ready { return 200 "OK"; add_header Content-Type text/plain; }

  # Cache hashed Blazor assets
  location ~* \.(css|js|wasm|png|jpg|svg|ico)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # SPA fallback
  location / { try_files $uri /index.html; }

  # Proxy API -> compose service 'api' on port 8080
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://api:8080/;
  }
}
